<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>inton 상태</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      width: 360px;
      margin: 0;
      color: #111827;
      background:
        radial-gradient(circle at 0 0, rgba(124, 58, 237, 0.14), transparent 34%),
        radial-gradient(circle at 100% 0, rgba(37, 99, 235, 0.12), transparent 34%),
        #f8fafc;
    }

    main {
      display: grid;
      gap: 14px;
      padding: 18px;
    }

    .panel {
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 18px 42px rgba(79, 70, 229, 0.14), 0 6px 18px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 16px;
    }

    .logo {
      display: grid;
      width: 38px;
      height: 38px;
      place-items: center;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      overflow: hidden;
      box-shadow: 0 10px 22px rgba(79, 70, 229, 0.24);
    }

    .logo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      margin: 0;
      color: #0f172a;
      font-size: 17px;
      line-height: 1.25;
    }

    .subtitle {
      margin: 3px 0 0;
      color: #64748b;
      font-size: 12px;
    }

    .status {
      margin: 0 16px 16px;
      padding: 14px;
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 20px;
      background: rgba(248, 250, 252, 0.76);
    }

    .label {
      margin: 0;
      color: #0f172a;
      font-size: 15px;
      font-weight: 850;
    }

    .detail,
    .url,
    .time {
      margin: 8px 0 0;
      color: #64748b;
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .url {
      padding-top: 8px;
      border-top: 1px solid rgba(226, 232, 240, 0.9);
      color: #334155;
    }

    ol {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0 16px 16px;
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 24px;
      color: #64748b;
      font-size: 13px;
    }

    li::before {
      content: "";
      width: 10px;
      height: 10px;
      border: 2px solid #dbe3f0;
      border-radius: 50%;
      background: #ffffff;
      flex: 0 0 auto;
    }

    li.is-active {
      color: #4338ca;
      font-weight: 850;
    }

    li.is-active::before {
      border-color: #7c3aed;
      background: #7c3aed;
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.12);
    }

    li.is-done {
      color: #2563eb;
    }

    li.is-done::before {
      border-color: #2563eb;
      background: #2563eb;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <div class="topbar">
        <div class="logo" aria-hidden="true"><img src="assets/icon48.png" alt=""></div>
        <div>
          <h1>inton</h1>
          <p class="subtitle">AI 기반 기사 신뢰도 분석</p>
        </div>
      </div>
      <section class="status">
        <p id="status-label" class="label">대기 중</p>
        <p id="status-detail" class="detail">링크 위에 마우스를 1초 동안 올려두면 시작합니다.</p>
        <p id="status-url" class="url"></p>
        <p id="status-time" class="time"></p>
      </section>
      <ol id="steps">
        <li data-stage="link_detected">링크 인식</li>
        <li data-stage="hover_confirmed">1초 머무름 확인</li>
        <li data-stage="extracting">본문 정보 가져오기</li>
        <li data-stage="news_checking">뉴스 판별</li>
        <li data-stage="analyzing">신뢰도·어그로도 분석</li>
        <li data-stage="complete">완료</li>
      </ol>
    </section>
  </main>
  <script src="action_popup.js"></script>
</body>
</html>
